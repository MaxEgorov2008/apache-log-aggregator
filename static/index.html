<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apache Log Aggregator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        html, body { height: 100%; margin: 0; background-color: #f0f2f5; }

        #loginBlock {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Высота на весь экран */
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .main-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 50px;
        }

        #progressPercent { font-weight: bold; }
    </style>
</head>
<body>

<div id="loginBlock">
    <div class="login-card">
        <h4 class="text-center mb-4">🔐 Вход в систему</h4>
        <div class="mb-3">
            <input type="text" id="user" class="form-control" placeholder="Логин (admin)">
        </div>
        <div class="mb-3">
            <input type="password" id="pass" class="form-control" placeholder="Пароль (admin123)">
        </div>
        <button onclick="doLogin()" class="btn btn-dark w-100 py-2">Войти</button>
        <div id="loginError" class="text-danger mt-3 text-center small"></div>
    </div>
</div>

<div id="mainContent" class="container py-5" style="display: none;">
    <div class="main-card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="m-0">📊 Агрегатор логов Apache</h2>
            <button onclick="location.reload()" class="btn btn-outline-danger btn-sm">Выйти</button>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <input type="text" id="keywordInput" class="form-control" placeholder="Ключевое слово...">
            </div>
            <div class="col-md-3">
                <input type="text" id="ipInput" class="form-control" placeholder="Фильтр по IP...">
            </div>
            <div class="col-md-5 d-flex gap-2">
                <button onclick="fetchLogs()" class="btn btn-primary flex-grow-1">Обновить данные</button>
                <button onclick="triggerParser()" class="btn btn-warning">Распарсить файлы</button>
                <button onclick="clearDatabase()" class="btn btn-danger">Очистить БД</button>
            </div>
        </div>

        <div id="loadingStatus" class="mb-3" style="display: none;">
            <div class="d-flex justify-content-between mb-1 small">
                <span>Загрузка данных...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress" style="height: 8px;">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>IP Адрес</th>
                        <th>Дата</th>
                        <th>Метод</th>
                        <th>URL</th>
                        <th>Статус</th>
                        <th>Размер</th>
                    </tr>
                </thead>
                <tbody id="logTableBody">
                    <tr><td colspan="6" class="text-center text-muted">Нет данных</td></tr>
                </tbody>
            </table>
        </div>
        <div id="errorDisplay" class="text-danger mt-2 small"></div>
    </div>
</div>

<script>

    async function doLogin() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const err = document.getElementById('loginError');

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });

            if (res.ok) {
                document.getElementById('loginBlock').style.setProperty('display', 'none', 'important');
                document.getElementById('mainContent').style.display = 'block';
                fetchLogs();
            } else {
                err.innerText = "Ошибка: неверный логин или пароль!";
            }
        } catch (e) {
            err.innerText = "Нет связи с сервером";
        }
    }

    function fetchLogs() {
        const tableBody = document.getElementById('logTableBody');
        const kw = document.getElementById('keywordInput').value.toLowerCase(); // Твое слово
        const ipFilter = document.getElementById('ipInput').value;
        const progDiv = document.getElementById('loadingStatus');

        progDiv.style.display = "block";

        const xhr = new XMLHttpRequest();
        xhr.open('GET', `/api/logs?ip=${ipFilter}`);

        xhr.onload = () => {
            if (xhr.status === 200) {
                const logs = JSON.parse(xhr.response);

                const filtered = logs.filter(l => {
                    const searchString = (l.url + l.method + l.ip).toLowerCase();
                    return searchString.includes(kw);
                });

                if (filtered.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="text-center">Ничего не найдено</td></tr>';
                } else {
                    tableBody.innerHTML = filtered.map(l => `
                        <tr>
                            <td><span class="badge bg-light text-dark border">${l.ip}</span></td>
                            <td>${new Date(l.timestamp).toLocaleString()}</td>
                            <td>${l.method}</td>
                            <td>${l.url}</td>
                            <td>${l.status}</td>
                            <td>${l.size}</td>
                        </tr>
                    `).join('');
                }
            }
            progDiv.style.display = "none";
        };
        xhr.send();
    }

    async function clearDatabase() {
        if (confirm("Вы уверены, что хотите удалить ВСЕ данные из базы?")) {
            const res = await fetch('/api/logs/clear', { method: 'DELETE' });
            if (res.ok) {
                alert("База данных пуста!");
                fetchLogs();
            }
        }
    }

    async function triggerParser() {
        await fetch('/api/parse/run', { method: 'POST' });
        fetchLogs();
    }
</script>

</body>
</html>
